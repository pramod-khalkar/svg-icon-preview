<svg width="40" height="40" viewBox="0 0 40 40" xmlns="http://www.w3.org/2000/svg">
  <!-- Flat minimal light icon (40x40) for SVG Toolkit -->
  <defs>
    <style>
      .bg { fill: #FFFFFF; }
      .outline { stroke: #E6EEF9; stroke-width: 1; }
      .tool-primary { fill: #0B63D6; }
      .tool-secondary { fill: #E85D04; }
      .svg-path { stroke: #E85D04; stroke-width: 1.6; fill: none; stroke-linecap: round; }
      .node { fill: #0B63D6; }
    </style>
  </defs>

  <rect class="bg outline" x="0.5" y="0.5" width="39" height="39" rx="7"/>

  <!-- Crossed spanner + screwdriver centered -->
  <g transform="translate(6,6) scale(0.9)">
    <!-- Spanner (flat) rotated -->
    <g transform="rotate(-30 14 14)">
      <rect x="5" y="13" width="18" height="3" rx="1.5" class="tool-primary"/>
      <path d="M24 12 C26 10 29 10 31 12 C33 14 32 17 30 18" class="tool-primary"/>
      <circle cx="31" cy="12.5" r="1.6" class="bg"/>
    </g>

    <!-- Screwdriver (flat) rotated opposite -->
    <g transform="rotate(40 14 14)">
      <rect x="12" y="4" width="3.2" height="14" rx="1.2" class="tool-secondary"/>
      <path d="M13.6 18 L15.6 22 L12.4 22 Z" class="tool-secondary"/>
    </g>

    <!-- SVG curve with nodes underneath tools -->
    <g transform="translate(2,22)">
      <path class="svg-path" d="M2 2 Q6 -2 10 2 Q14 6 18 2"/>
      <circle class="node" cx="2" cy="2" r="1.2"/>
      <circle class="node" cx="10" cy="2" r="1.2"/>
      <circle class="node" cx="18" cy="2" r="1.2"/>
    </g>
  </g>
</svg>



