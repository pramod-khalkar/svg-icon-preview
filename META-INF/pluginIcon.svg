<svg xmlns="http://www.w3.org/2000/svg" width="40" height="40" viewBox="0 0 40 40">
  <!-- File document shape with folded corner -->
  <path d="M6 3 L24 3 L32 11 L32 37 L6 37 Z" fill="#FFFFFF" stroke="#3D4D5C" stroke-width="1.5" stroke-linejoin="round"/>
  <!-- Folded corner flap -->
  <path d="M24 3 L24 11 L32 11 Z" fill="#DDE3EA" stroke="#3D4D5C" stroke-width="1.5" stroke-linejoin="round"/>
  <!-- SVG label text -->
  <text x="19" y="18" font-family="Arial, sans-serif" font-size="7" font-weight="700" fill="#3D4D5C" text-anchor="middle" letter-spacing="0.3">SVG</text>
  <!-- Bezier path curve and nodes — light thin strokes -->
  <path d="M10 28 Q14 22 19 24" fill="none" stroke="#3D4D5C" stroke-width="1" stroke-linecap="round"/>
  <!-- Anchor nodes (squares) -->
  <rect x="8.5" y="26.5" width="3" height="3" rx="0.5" fill="none" stroke="#3D4D5C" stroke-width="0.9"/>
  <rect x="17.5" y="22.5" width="3" height="3" rx="0.5" fill="none" stroke="#3D4D5C" stroke-width="0.9"/>
  <!-- Control handle node (circle) -->
  <circle cx="13" cy="22" r="1.4" fill="none" stroke="#3D4D5C" stroke-width="0.9"/>
  <!-- Control handle line -->
  <line x1="10" y1="28" x2="13" y2="22" stroke="#3D4D5C" stroke-width="0.7" stroke-dasharray="1.5,1"/>

  <!-- Wrench+pencil badge (bottom-right) — smaller circle r=7 -->
  <circle cx="29" cy="31" r="7" fill="#FFFFFF" stroke="#3D4D5C" stroke-width="1"/>
  <!-- Wrench body -->
  <path d="M24.5 35 L27.8 31.7 L27.2 31.1 C26.5 29.7 26.9 28.0 28.0 27.0 C28.9 26.2 30.1 25.9 31.2 26.2 L29.5 27.9 L29.9 29.6 L31.6 30.0 L33.3 28.3 C33.6 29.4 33.3 30.6 32.4 31.5 C31.4 32.6 29.7 32.9 28.4 32.2 L27.8 31.7 L24.5 35 Z" fill="#3D9E9E" stroke="none"/>
  <!-- Pencil icon -->
  <g transform="translate(21.5, 27.5) rotate(-45)">
    <rect x="0" y="0" width="3" height="6.5" rx="0.5" fill="#3D9E9E"/>
    <polygon points="0,6.5 3,6.5 1.5,9" fill="#5BBFBF"/>
  </g>
</svg>
